<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.nobr</title>

        <!-- vendors -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">
        <script type="module" src="../vendors/sweet-alerts-demo-init.js"></script>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">

    <body>

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.nobr</h1>

            <p>
                A helper component for text formatting: to prevent line breaks. It makes sense
                to use in cases where it is not possible to use non-breaking hyphens or spaces.
                For example:
                <span class="nobr"><a class="link link--fake" href="tel:+71234567890">+7 (123) 456-78-90</a></span>
                ← a phone number in a long text which comes in already formatted form from the database.
            </p>
