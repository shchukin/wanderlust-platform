    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>actions-table</h1>
            <br>
            
            <table class="actions-table">
                <thead class="actions-table__section actions-table__section--head">
                    <tr class="actions-table__row">
                        <th class="actions-table__cell">
                            Select your video
                        </th>
                        <th class="actions-table__cell">
                            Enter reference URL below
                        </th>
                        <th class="actions-table__cell">
                            <span class="visuallyhidden">Add</span>
                        </th>
                        <th class="actions-table__cell">
                            <span class="visuallyhidden">Delete</span>
                        </th>
                    </tr>
                </thead>
                <tbody class="actions-table__section actions-table__section--body">
                    <tr class="actions-table__row">
                        <td class="actions-table__cell">
                            <div class="input">
                                <select class="input__widget">
                                    <option value="placeholder">Select film</option>
                                    <option value="1">Foo</option>
                                    <option value="2">Bar</option>
                                    <option value="3">Baz</option>
                                </select>
                            </div>
                        </td>
                        <td class="actions-table__cell">
                            <div class="input">
                                <input class="input__widget" type="text" placeholder="Please enter a valid URL">
                            </div>
                        </td>
                        <td class="actions-table__cell actions-table__cell--action">
                            <button class="button button--square button--light-gray-outline" type="button">
                                <i class="icon">add</i>
                            </button>
                        </td>
                        <td class="actions-table__cell actions-table__cell--action">
                            <button class="button button--square button--light-gray-outline" type="button">
                                <i class="icon">delete</i>
                            </button>
                        </td>
                    </tr>
                    <tr class="actions-table__row">
                        <td class="actions-table__cell">
                            <div class="input">
                                <select class="input__widget">
                                    <option value="placeholder">Select film</option>
                                    <option value="1">Foo</option>
                                    <option value="2">Bar</option>
                                    <option value="3">Baz</option>
                                </select>
                            </div>
                        </td>
                        <td class="actions-table__cell">
                            <div class="input">
                                <input class="input__widget" type="text" placeholder="Please enter a valid URL">
                            </div>
                        </td>
                        <td class="actions-table__cell actions-table__cell--action">
                            <button class="button button--square button--light-gray-outline" type="button">
                                <i class="icon">add</i>
                            </button>
                        </td>
                        <td class="actions-table__cell actions-table__cell--action">
                            <button class="button button--square button--light-gray-outline" type="button">
                                <i class="icon">delete</i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <br>
            <br>

            <table class="actions-table">
                <thead class="actions-table__section actions-table__section--head">
                    <tr class="actions-table__row">
                        <th class="actions-table__cell">
                            Name
                        </th>
                        <th class="actions-table__cell">

                                <input class="input__widget" type="number" min="0" max="100" step="1" placeholder="0">

                        </td>
                        <td class="actions-table__cell">
                            <div class="input">
                                <select class="input__widget">

                            </button>
