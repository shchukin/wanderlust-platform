<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/filepond@4.30.6/dist/filepond.min.css">
        <link rel="stylesheet" href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.css">
        <script src="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.js"></script>
        <script type="module" src="../scripts/vendors.js"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>rating</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>rating</h1>
            <p>
                Form element, based on 5 radiobuttons. No JS needed:
            </p>

            <div class="rating">
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="5">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="4">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="3">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="2">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="1">
                </label>
            </div>

            <br>
            <br>
            <h2>rating--output</h2>
            <p>
                Inlined width:
            </p>

            <div class="rating rating--output">
                <div class="rating__fill" style="width: 70%;"></div>
            </div>

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
