<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.rating</title>

        <!-- Sweet Alerts -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">
        <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
        <script src="../vendors/sweet-alerts-demo-init.js"></script>

        <!-- Tom Select-->
        <link rel="stylesheet" href="../../node_modules/tom-select/dist/css/tom-select.css">
        <script src="../../node_modules/tom-select/dist/js/tom-select.complete.min.js"></script>
        <script src="../vendors/tom-select-demo-init.js"></script>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.rating</h1>


            <div class="rating" role="radiogroup" aria-label="Rating">
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="5">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="4">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="3">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="2">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="1">
                </label>
            </div>

            <br>
            <br>
            <h2>.rating--output</h2>

            <div class="rating rating--output">
                <div class="rating__fill" style="width: 70%;"></div>
            </div>

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
