<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
        <script type="module" src="../scripts/vendors.js"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>checkboxes-menu</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background: white">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>checkboxes-menu</h1>
            <p>
                By default, widths are distributed proportionally. Items are not equal but it looks better:
            </p>

            <div class="checkboxes-menu">
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Wanderlust Videos Defaults
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Your Previous Videos
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Custom References
                        </div>
                    </label>
                </div>
            </div>



            <br>
            <br>
            <br>
            <h2>checkboxes-menu--fixed-width</h2>
            <p>
                Forcing equal width:
            </p>


            <div class="checkboxes-menu checkboxes-menu--fixed-width">
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Wanderlust Videos Defaults
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Your Previous Videos
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Custom References
                        </div>
                    </label>
                </div>
            </div>


            <br>

            <br>
