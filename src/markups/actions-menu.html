<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
        <script type="module" src="../scripts/vendors.js"></script>

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.actions-menu</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.actions-menu</h1>
            <p>
                Simple wrapper that sets up spacing and line break rules
            </p>

            <div class="actions-menu">
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">edit</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">add</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">delete</i>
                </button>
                <button class="button button--square button--green" type="button">
                    <i class="icon">thumb_up</i>
                </button>
                <button class="button button--square button--red" type="button">
                    <i class="icon">thumb_down</i>
                </button>
            </div>


            <br>
            <br>
            <br>
            <p>
                Feel free to use <a href="dropdown.html">.dropdown</a> inside:
            </p>

            <div class="actions-menu">
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">notifications_active</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">label</i>
                </button>
                <div class="dropdown">
                    <div class="dropdown__handler">
                        <button class="button button--square button--light-gray-outline" type="button">
                            <i class="icon">more_vert</i>
                        </button>
                    </div>
                    <div class="dropdown__body">
                        <div class="menu">
                            <a class="menu__item" href="#">
                                <i class="icon">forward</i>
                                Lorem Ipsum
                            </a>
                            <a class="menu__item" href="#">
                                <i class="icon">forward</i>
                                Dolor
                            </a>
                            <a class="menu__item" href="#">
                                <i class="icon">forward</i>
                                Sit amen
                            </a>
                            <a class="menu__item menu__item--danger" href="#">
                                <i class="icon">delete</i>
                                Delete
                            </a>
                            <div class="menu__close">
                                <button class="button button--height-32px button--black" type="button">
                                    <i class="icon">close</i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <br>
            <h2>.actions-menu--4-columns</h2>

            <div class="actions-menu actions-menu--4-columns">
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">play_circle</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">edit</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">settings</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">delete</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">create_new_folder</i>
                </button>
                <button class="button button--square button--light-gray-outline" type="button">
                    <i class="icon">visibility</i>
                </button>
                <button class="button button--square button--green" type="button">
                    <i class="icon">thumb_up</i>
                </button>
                <button class="button button--square button--red" type="button">
                    <i class="icon">thumb_down</i>
                </button>
            </div>



            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
