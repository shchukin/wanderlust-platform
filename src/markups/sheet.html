<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.sheet</title>

        <!-- Sweet Alerts -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">
        <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
        <script src="../scripts/vendors/sweet-alerts-demo-init.js"></script>

        <!-- Tom Select-->
        <link rel="stylesheet" href="../../node_modules/tom-select/dist/css/tom-select.css">
        <script src="../../node_modules/tom-select/dist/js/tom-select.complete.min.js"></script>
        <script src="../scripts/vendors/tom-select-demo-init.js"></script>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.sheet</h1>
            <br>

            <div class="sheet">
                <div class="sheet__row">
                    <b class="sheet__param">Subtotal</b>
                    <div class="sheet__value">$648</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Total Discounts</b>
                    <div class="sheet__value">-$84.70</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Total Surcharges</b>
                    <div class="sheet__value">$0.00</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Refunds</b>
                    <div class="sheet__value">$0.00</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Total Due</b>
                    <div class="sheet__value">$563.30</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Total Paid</b>
                    <div class="sheet__value">$563.30</div>
                </div>
                <div class="sheet__row">
                    <b class="sheet__param">Balance Due</b>
                    <div class="sheet__value">$0.00</div>
                </div>
            </div>


            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
