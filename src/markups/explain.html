    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>explain</h1>

            <p>
                Это небольшой разметочнй блок, который создаёт иконку и добавляет к ней тултип.
                В качестве тултипа используется отдельный блок <a href="bubble.html"><b><i>bubble</i></b></a>.
                Скрытие и показ там же. Здесь только иконки и позиционирование.
            </p>
            <p>
                Смотрим:
            </p>

            <div class="explain bubble-context">
                <button class="explain__icon bubble-handler" type="button">
                    Подсказка
                </button>
                <div class="bubble">
                    <div class="bubble__body">
                        <i class="bubble__chevron"></i>
                        <div class="bubble__background">
                            Lorem ipsum dolor sit amet
                        </div>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <br>
            <h2>.bubble--larger</h2>

            <div class="explain explain--larger bubble-context">
                <button class="explain__icon bubble-handler" type="button">
                    Подсказка
                </button>
                <div class="bubble">
                    <div class="bubble__body">
                        <i class="bubble__chevron"></i>
                        <div class="bubble__background">
                            Lorem ipsum dolor sit amet
                        </div>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>

            <br>
            <br>
