<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tom Select</title>

        <!-- Sweet Alerts -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">
        <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
        <script src="../vendors/sweet-alerts-demo-init.js"></script>

        <!-- Tom Select-->
        <link rel="stylesheet" href="../../node_modules/tom-select/dist/css/tom-select.css">
        <script src="../../node_modules/tom-select/dist/js/tom-select.complete.min.js"></script>
        <script src="../vendors/tom-select-demo-init.js"></script>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>Tom Select</h1>
            <br>

            <h3>Multi-select (max 3)</h3>
            <br>
            <select class="js-select-multi" multiple placeholder="Pick up to 3 states">
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX">Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>
            <br>
            <h3>Multi-select (no typing)</h3>
            <br>
            <select class="js-select-multi-static" multiple placeholder="Choose up to 3 destinations">
                <option value="">Choose up to 3 destinations</option>
                <option value="BCN">Barcelona</option>
                <option value="LIS">Lisbon</option>
                <option value="NAP">Naples</option>
                <option value="OSL">Oslo</option>
                <option value="PRG">Prague</option>
            </select>

            <br>
            <br>
            <h3>Tags (create on the fly)</h3>
            <br>
            <input class="js-select-tags" type="text" placeholder="Add tags: ui, docs, frontend">

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>


    </body>
</html>
