<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
        <script type="module" src="../scripts/vendors.js"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tom Select</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>Tom Select</h1>


            <br>
            <br>
            <h3>Multi-select (max 3)</h3>

            <select class="tom-select" data-ref="init-tom-select-multi" multiple placeholder="Pick up to 3 states">
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX">Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>

            <select class="tom-select" data-ref="init-tom-select-multi" multiple placeholder="Pick up to 3 states">
                <option value="CA" selected>California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY" selected>New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX" selected>Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>
            <br>
            <h2>Disabled</h2>


            <select class="tom-select" data-ref="init-tom-select-multi" multiple placeholder="Pick up to 3 states" disabled>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX">Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>
            <select class="tom-select" data-ref="init-tom-select-multi" multiple placeholder="Pick up to 3 states" disabled>
                <option value="CA" selected>California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY" selected>New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX" selected>Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>
            <br>
            <h3>Multi-select (no typing)</h3>

            <select class="tom-select" data-ref="init-tom-select-multi-static" multiple placeholder="Choose up to 3 destinations">
                <option value="BCN">Barcelona</option>
                <option value="LIS">Lisbon</option>
                <option value="NAP">Naples</option>
                <option value="OSL">Oslo</option>
                <option value="PRG">Prague</option>
            </select>

            <br>
            <br>
            <h3>Single Select</h3>

            <select class="tom-select" data-ref="init-tom-select-single" placeholder="Select a state...">
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
            </select>

            <br>
            <br>
            <h3>Single Select (no typing)</h3>

            <select class="tom-select" data-ref="init-tom-select-single-static" placeholder="Pick a destination...">
                <option value="PAR">Paris</option>
                <option value="LON">London</option>
                <option value="ROM">Rome</option>
                <option value="BER">Berlin</option>
            </select>


            <br>
            <br>
            <h3>Tags (create on the fly)</h3>

            <input class="tom-select" data-ref="init-tom-select-tags" type="text" placeholder="Add tags: ui, docs, frontend">


            <br>
            <br>
            <h3>Custom Rendering</h3>

            <select class="tom-select" data-ref="init-tom-select-bonuses" placeholder="Select a value..."></select>

            <br>
            <br>
            <h3>Remote Loading (GitHub API)</h3>

            <select class="tom-select" data-ref="init-tom-select-remote" placeholder="Search for GitHub repository..."></select>


            <br>
            <br>
            <h3>.clear-tom-select</h3>

            <select class="clear-tom-select" data-ref="init-tom-select-bonuses" placeholder="Select a value..."></select>


            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>


    </body>
</html>
