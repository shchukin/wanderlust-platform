<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.described-action</title>

        <!-- Sweet Alerts -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css">
        <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
        <script src="../scripts/vendors/sweet-alerts-demo-init.js"></script>

        <!-- Tom Select-->
        <link rel="stylesheet" href="../../node_modules/tom-select/dist/css/tom-select.css">
        <script src="../../node_modules/tom-select/dist/js/tom-select.complete.min.js"></script>
        <script src="../scripts/vendors/tom-select-demo-init.js"></script>

        <!-- Choices.js -->
        <link rel="stylesheet" href="../../node_modules/choices.js/public/assets/styles/choices.min.css">
        <script src="../../node_modules/choices.js/public/assets/scripts/choices.min.js"></script>
        <script src="../scripts/vendors/choices-demo-init.js"></script>

        <!-- Air Datapicker -->
        <link rel="stylesheet" href="../../node_modules/air-datepicker/air-datepicker.css">
        <script src="../../node_modules/air-datepicker/air-datepicker.js"></script>
        <script type="module" src="../scripts/vendors/air-datepicker-demo-init.js"></script>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.described-action</h1>


            <button class="described-action" type="button">
                <div class="described-action__icon">
                    <i class="icon">play_circle</i>
                </div>
                Watch Video
            </button>

            <button class="described-action" type="button">
                <div class="described-action__icon">
                    <i class="icon">thumb_up</i>
                </div>
                Approve
            </button>

            <button class="described-action" type="button">
                <div class="described-action__icon">
                    <i class="icon">thumb_down</i>
                </div>
                Request Revisions
            </button>


            <br>
            <br>
            <br>
            <h2>.described-actions-list</h2>
            <p>
                Use a <b><i>&lt;div class="described-actions-list"&gt;...&lt;/div&gt;</i></b> wrapper
                when there is a list of them to give them similar clickable area.
            </p>


            <div class="described-actions-list">
                <button class="described-action" type="button">
                    <div class="described-action__icon">
                        <i class="icon">play_circle</i>
                    </div>
                    Watch Video
                </button>
                <button class="described-action" type="button">
                    <div class="described-action__icon">
                        <i class="icon">thumb_up</i>
                    </div>
                    Approve
                </button>
                <button class="described-action" type="button">
                    <div class="described-action__icon">
                        <i class="icon">thumb_down</i>
                    </div>
                    Request Revisions
                </button>
            </div>

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
