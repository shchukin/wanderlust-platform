<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">
        <script type="module" src="../scripts/vendors.js"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>form</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css">
        <script type="module" src="../scripts/scripts.js"></script>
    </head>
    <body>

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>form</h1>
            <br>

            <div class="form">
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="project-name">
                            Project Name:
                        </label>
                    </div>
                    <div class="form__field">
                        <div class="form__widget">
                            <div class="input">
                                <input class="input__widget" type="text" id="project-name">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="footage-size">
                            Estimated Footage File Size:
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="footage-size">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>100GB</option>
                                    <option>200GB</option>
                                    <option>...</option>
                                    <option>1TB (1000GB)</option>
                                </select>
                            </div>
                            <div class="helper">
                                Base price includes 1 TB (1000GB) footage file size
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="language">
                            Language:
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="language">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>English</option>
                                    <option>Spanish</option>
                                    <option>...</option>
                                    <option>Thai</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="editing-platform">
                            Preferred Editing Platform:
                        </label>
                    </div>
                    <div class="form__field">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="editing-platform">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>DaVinchi</option>
                                    <option>Spanish</option>
                                    <option>...</option>
                                    <option>FinalCut</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="event-duration">
                            Event Duration:
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="event-duration">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>30 min</option>
                                    <option>60 min</option>
                                    <option>...</option>
                                    <option>2 hours</option>
                                </select>
                            </div>
                            <div class="helper">
                                Base price includes 1 day
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="wedding-date">
                            Wedding Date:
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <input class="input__widget" type="text" id="wedding-date" placeholder="Choose">
                                <div class="input__icon">
                                    <i class="icon">calendar_month</i>
                                </div>
                            </div>
                            <div class="helper">
                                Base price includes 1 day
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <br>
            <br>

            <div class="form">
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="event-duration-2">
                            Event Duration
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="event-duration-2">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>1 day (included)</option>
                                    <option>2 days</option>
                                    <option>...</option>
                                    <option>5 days</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="footage-size-2">
                            Footage File Size
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <div class="input">
                                <select class="input__widget" id="footage-size-2">
                                    <option value="placeholder" selected>Choose</option>
                                    <option>100GB</option>
                                    <option>200GB</option>
                                    <option>...</option>
                                    <option>1TB (1000GB)</option>
                                </select>
                            </div>
                            <div class="helper">
                                Base price includes 1 TB (1000GB) footage file size
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form__row">
                    <div class="form__label">
                        <label class="label label--inline" for="wedding-date">
                            Total
                        </label>
                    </div>
                    <div class="form__field form__field--halved">
                        <div class="form__widget">
                            <big style="font-weight: 500">$150</big>
                        </div>
                    </div>
                </div>
            </div>



            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
