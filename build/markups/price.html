<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css?1776085787">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css?1776085787">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css?1776085787">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/filepond@4.30.6/dist/filepond.min.css?1776085787">
        <link rel="stylesheet" href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css?1776085787">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.css?1776085787">
        <script src="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.js"></script>
        <script type="module" src="../scripts/vendors.js?1776085787"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>price</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css?1776085787">
        <script type="module" src="../scripts/scripts.js?1776085787"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 360px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>price</h1>
            <br>

            <div class="price">
                <button class="price__handler" type="button">
                    <span class="price__handler-inner">Highlight Film (3-6 min)</span>
                </button>
                <div class="price__dropdown">
                    <table class="price__table">
                        <tr class="price__row">
                            <th class="price__param">Color Grading:</th>
                            <td class="price__value"><i class="icon">check</i></td>
                        </tr>
                        <tr class="price__row">
                            <th class="price__param">Creative Effects:</th>
                            <td class="price__value"><i class="icon">check</i></td>
                        </tr>
                        <tr class="price__row">
                            <th class="price__param">Exp. Resolution:</th>
                            <td class="price__value">1080p Letterbox</td>
                        </tr>
                        <tr class="price__row">
                            <th class="price__param">Extra Export:</th>
                            <td class="price__value"><i class="icon">check</i></td>
                        </tr>
                        <tr class="price__row price__row--total">
                            <th class="price__param">Price:</th>
                            <td class="price__value">$890</td>
                        </tr>
                    </table>
                </div>
            </div>



            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
