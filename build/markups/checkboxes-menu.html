    <body style="background: white">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>checkboxes-menu</h1>
            <p>
                By default, widths are distributed proportionally. Items are not equal but it looks better:
            </p>

            <div class="checkboxes-menu">
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Wanderlust Videos Defaults
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Your Previous Videos
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Custom References
                        </div>
                    </label>
                </div>
            </div>



            <br>
            <br>
            <br>
            <h2>checkboxes-menu--fixed-width</h2>
            <p>
                Forcing equal width:
            </p>


            <div class="checkboxes-menu checkboxes-menu--fixed-width">
                <div class="checkboxes-menu__item">
                    <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">

                <div class="checkboxes-menu__item">

            <h2>checkboxes-menu--two-columns</h2>

            <div class="checkboxes-menu checkboxes-menu--two-columns">
                <div class="checkboxes-menu__item">
                    <label class="
                        choice choice--nowrap
                        choice--input-alike
                        choice--full-width
                        choice--blue-when-checked
                    ">
                        <input class="choice__widget" type="radio" name="footage-source" data-tab-target="drive-shipping" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">radio_button_unchecked</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">radio_button_checked</i>
                        </div>
                        <div class="choice__label">
                            I’ll ship my hard drive to you
                        </div>
                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label class="
                        choice choice--nowrap
                        choice--input-alike
                        choice--full-width
                        choice--blue-when-checked
                    ">
                        <input class="choice__widget" type="radio" name="footage-source" data-tab-target="cloud-storage">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">radio_button_unchecked</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">

                            <i class="icon">radio_button_checked</i>

                            Upload to WanderDrive

                    </label>
                </div>
                <div class="checkboxes-menu__item">
                    <label
                        class="choice choice--nowrap
                           choice--input-alike
                           choice--full-width
                           choice--blue-when-checked

                        <input class="choice__widget" type="radio" name="footage-source">
                        <div class="choice__icon choice__icon--unchecked">

                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">radio_button_checked</i>
                        </div>
