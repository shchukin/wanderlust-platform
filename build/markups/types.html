<html lang="en">
    <head>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css?1776086945">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/filepond@4.30.6/dist/filepond.min.css?1776086945">
        <link rel="stylesheet" href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css?1776086945">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.css?1776086945">
        <script src="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.js"></script>
        <script type="module" src="../scripts/vendors.js?1776086945"></script>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>types</title>

        <link rel="stylesheet" href="../styles/styles.css?1776086945">

    <body>

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>types</h1>

            <div class="types">
                <div class="types__list">
                    <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox" checked>
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            All
                        </div>
                    </label>
                    <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Projects
                        </div>
                    </label>
                    <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                        <input class="choice__widget" type="checkbox">
                        <div class="choice__icon choice__icon--unchecked">
                            <i class="icon">check_box_outline_blank</i>
                        </div>
                        <div class="choice__icon choice__icon--checked">
                            <i class="icon">check_box</i>
                        </div>
                        <div class="choice__label">
                            Inbox
                        </div>
                    </label>
                </div>
                <div class="types__footer">
                    <div class="types__apply">
                        <button class="button button--height-24px" type="button">
                            Apply
                        </button>
                    </div>
                    <div class="types__cancel">
                        <button class="link" type="button">Cancel</button>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <p>
                Normally you would use it with <a href="dropdown.html"><b><i>dropdown</i></b></a> component
            </p>
            <br>

            <div class="dropdown">
                <div class="dropdown__handler">
                    <button class="button button--clear button--height-32px" type="button">
                        <i class="icon">instant_mix</i>
                        Filter
                    </button>
                </div>
                <div class="dropdown__body">
                    <div class="types">
                        <div class="types__list">
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox" checked>
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>
                                <div class="choice__icon choice__icon--checked">
                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    All
                                </div>
                            </label>
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox">
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>
                                <div class="choice__icon choice__icon--checked">
                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    Projects
                                </div>
                            </label>
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox">
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>
                                <div class="choice__icon choice__icon--checked">
                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    Inbox
                                </div>
                            </label>
                        </div>
                        <div class="types__footer">
                            <div class="types__apply">
                                <button class="button button--height-24px" type="button">
                                    Apply
                                </button>
                            </div>
                            <div class="types__cancel">
                                <button class="link" type="button">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <br>
            <br>
            <p>
                But there is also a usage case with a <a href="sort.html"><b><i>sort</i></b></a> component:
            </p>
            <br>

            <div class="sort sort__order--descending">
                <button class="sort__handler" type="button">
                    Sort by type
                </button>
                <button class="sort__order" type="button">
                    <i class="icon">filter_list</i>
                </button>
                <div class="sort__dropdown">
                    <div class="types">
                        <div class="types__list">
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox" checked>
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>

                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    All
                                </div>
                            </label>
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox">
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>
                                <div class="choice__icon choice__icon--checked">
                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    Projects
                                </div>
                            </label>
                            <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                                <input class="choice__widget" type="checkbox">
                                <div class="choice__icon choice__icon--unchecked">
                                    <i class="icon">check_box_outline_blank</i>
                                </div>
                                <div class="choice__icon choice__icon--checked">
                                    <i class="icon">check_box</i>
                                </div>
                                <div class="choice__label">
                                    Inbox
                                </div>
                            </label>
                        </div>
                        <div class="types__footer">
                            <div class="types__apply">
                                <button class="button button--height-24px" type="button">
                                    Apply
                                </button>
                            </div>
                            <div class="types__cancel">
                                <button class="link" type="button">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>




            <br>
