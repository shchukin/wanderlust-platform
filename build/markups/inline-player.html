<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css?1775762053">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css?1775762053">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css?1775762053">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/filepond@4.30.6/dist/filepond.min.css?1775762053">
        <link rel="stylesheet" href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css?1775762053">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.css?1775762053">
        <script src="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.js"></script>
        <script type="module" src="../scripts/vendors.js?1775762053"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>inline-player</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css?1775762053">
        <script type="module" src="../scripts/scripts.js?1775762053"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 300px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>inline-player</h1>
            <br>

            <div class="inline-player">
                Lyrical
                <div class="inline-player__body">
                    <div class="inline-player__playback">
                        <button class="icon-action icon-action--32px" type="button">
                            <i class="icon">play_arrow</i>
                        </button>
                    </div>
                    <div class="inline-player__sound-wave">
                        <i class="icon">graphic_eq</i>
                        <i class="icon">graphic_eq</i>
                        <i class="icon">graphic_eq</i>
                    </div>
                </div>
            </div>

            <br>
            <p>Meant to be used inside of <a href="choices.html"><b><i>choice</i></b></a>:</p>

            <label class="choice choice--input-alike choice--full-width choice--blue-when-checked">
                <input class="choice__widget" type="radio" name="soundtrack-style" >
                <div class="choice__icon choice__icon--unchecked">
                    <i class="icon">radio_button_unchecked</i>
                </div>
                <div class="choice__icon choice__icon--checked">
                    <i class="icon">radio_button_checked</i>
                </div>
                <div class="choice__label">
                    <div class="inline-player">
                        Lyrical
                        <div class="inline-player__body">
                            <div class="inline-player__playback">
                                <button class="icon-action icon-action--32px" type="button">
                                    <i class="icon">play_arrow</i>
                                </button>
                            </div>
                            <div class="inline-player__sound-wave">
                                <i class="icon">graphic_eq</i>
                                <i class="icon">graphic_eq</i>
                                <i class="icon">graphic_eq</i>
                            </div>
                        </div>
                    </div>
                </div>
            </label>




            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>


    </body>
</html>
