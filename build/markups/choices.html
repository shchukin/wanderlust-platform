<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css?1775764163">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css?1775764163">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css?1775764163">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/filepond@4.30.6/dist/filepond.min.css?1775764163">
        <link rel="stylesheet" href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css?1775764163">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.css?1775764163">
        <script src="https://cdn.jsdelivr.net/npm/hystmodal@1/dist/hystmodal.min.js"></script>
        <script type="module" src="../scripts/vendors.js?1775764163"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Choices.js</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css?1775764163">
        <script type="module" src="../scripts/scripts.js?1775764163"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>Choices.js</h1>
            <p>
                This is <b>plan b</b> for the <a href="tom-select.html"><b><i>tom-select</i></b></a>
                since that one has a long history of legacy and it is getting way too hard to style it.
            </p>
            <br>

            <h3>Single Select</h3>
            <select class="js-choices-single" placeholder="Select a state...">
                <option value="">Select a state...</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
            </select>

            <br>
            <br>
            <h3>Multi-select (max 3)</h3>
            <select class="js-choices-multi" multiple placeholder="Pick up to 3 states">
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="FL">Florida</option>
                <option value="HI">Hawaii</option>
                <option value="MA">Massachusetts</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="OR">Oregon</option>
                <option value="TX">Texas</option>
                <option value="WA">Washington</option>
            </select>

            <br>
            <br>
            <h3>Tags (Text Input)</h3>
            <input class="js-choices-tags" type="text" placeholder="Add tags: ui, docs, frontend">

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>


    </body>
</html>
