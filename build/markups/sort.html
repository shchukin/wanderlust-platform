<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Vendors (feel free to add them via Rails gems, composer, webpack/vite or any other package manager) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css?1772641246">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.0/air-datepicker.min.css?1772641246">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css?1772641246">
        <script type="module" src="../scripts/vendors.js?1772641246"></script>

        <!-- Font -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>sort</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css?1772641246">
        <script type="module" src="../scripts/scripts.js?1772641246"></script>
    </head>
    <body>

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>sort</h1>

            <div class="sort sort__order--descending">
                <button class="sort__handler" type="button">
                    Sort by type
                </button>
                <button class="sort__order" type="button">
                    <i class="icon">filter_list</i>
                </button>
                <div class="sort__dropdown">
                    <div class="sort__list">
                        <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                            <input class="choice__widget" type="checkbox" checked>
                            <div class="choice__icon choice__icon--unchecked">
                                <i class="icon">check_box_outline_blank</i>
                            </div>
                            <div class="choice__icon choice__icon--checked">
                                <i class="icon">check_box</i>
                            </div>
                            <div class="choice__label">
                                All
                            </div>
                        </label>
                        <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                            <input class="choice__widget" type="checkbox">
                            <div class="choice__icon choice__icon--unchecked">
                                <i class="icon">check_box_outline_blank</i>
                            </div>
                            <div class="choice__icon choice__icon--checked">
                                <i class="icon">check_box</i>
                            </div>
                            <div class="choice__label">
                                Projects
                            </div>
                        </label>
                        <label class="choice choice--smaller choice--full-width choice--gray choice--blue-when-checked">
                            <input class="choice__widget" type="checkbox">
                            <div class="choice__icon choice__icon--unchecked">
                                <i class="icon">check_box_outline_blank</i>
                            </div>
                            <div class="choice__icon choice__icon--checked">
                                <i class="icon">check_box</i>
                            </div>
                            <div class="choice__label">
                                Inbox
                            </div>
                        </label>
                    </div>
                    <div class="sort__footer">
                        <div class="sort__apply">
                            <button class="button button--height-24px" type="button">
                                Apply
                            </button>
                        </div>
                        <div class="sort__cancel">
                            <button class="link" type="button">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>




            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
