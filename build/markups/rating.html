<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- VENDORS -->
        <!-- Ignore these imports and add these libs to your project the way it meant to be: via Rails gems, composer, webpack/vite, etc -->

        <!-- Sweet Alerts -->
        <link rel="stylesheet" href="../../node_modules/sweetalert2/dist/sweetalert2.min.css?1772537926">
        <script src="../../node_modules/sweetalert2/dist/sweetalert2.all.min.js?1772537926"></script>
        <script src="../scripts/vendors/sweet-alerts-demo-init.js"></script>

        <!-- Tom Select-->
        <link rel="stylesheet" href="../../node_modules/tom-select/dist/css/tom-select.css?1772537926">
        <script src="../../node_modules/tom-select/dist/js/tom-select.complete.min.js?1772537926"></script>
        <script src="../scripts/vendors/tom-select-demo-init.js"></script>

        <!-- Choices.js -->
        <link rel="stylesheet" href="../../node_modules/choices.js/public/assets/styles/choices.min.css?1772537926">
        <script src="../../node_modules/choices.js/public/assets/scripts/choices.min.js?1772537926"></script>
        <script src="../scripts/vendors/choices-demo-init.js"></script>

        <!-- Air Datapicker -->
        <link rel="stylesheet" href="../../node_modules/air-datepicker/air-datepicker.css?1772537926">
        <script src="../../node_modules/air-datepicker/air-datepicker.js?1772537926"></script>
        <script type="module" src="../scripts/vendors/air-datepicker-demo-init.js"></script>

        <!--/VENDORS -->

        <!-- meta -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>.rating</title>

        <!-- assets -->
        <link rel="stylesheet" href="../styles/styles.css?1772537926">
        <script type="module" src="../scripts/scripts.js?1772537926"></script>
    </head>
    <body style="background-color: white;">

        <div style="max-width: 720px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>.rating</h1>
            <p>
                Form element, based on 5 radiobuttons. No JS needed:
            </p>

            <div class="rating">
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="5">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="4">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="3">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="2">
                </label>
                <label class="rating__label">
                    <input class="rating__input" type="radio" name="rating" value="1">
                </label>
            </div>

            <br>
            <br>
            <h2>.rating--output</h2>
            <p>
                Inlined width:
            </p>

            <div class="rating rating--output">
                <div class="rating__fill" style="width: 70%;"></div>
            </div>

            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
</html>
