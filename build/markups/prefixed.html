    <body style="background-color: white;">

        <div style="max-width: 920px; margin: 0 auto; padding: 0 var(--container-padding);">
            <br>
            <br>
            <h1>prefixed</h1>

            <p>
                In general, it is a way to prefix a string with a certain action:
            </p>
            <br>

            <div class="prefixed">
                <div class="prefixed__content">
                    lorem ipsum
                </div>
                <div class="prefixed__action">
                    <button class="icon-action" type="button">
                        <i class="icon">refresh</i>
                    </button>
                </div>
            </div>

            <br>
            <br>
            <br>
            <p>
                Any action and any text can be inside:
            </p>
            <br>
            <br>

            <div class="prefixed">
                <div class="prefixed__content">
                    <a class="link link--inverted-text-alike" href="mailto:zeeshan@wanderlust-videos.com">
                        zeeshan@wanderlust-videos.com
                    </a>
                </div>
                <div class="prefixed__action">
                    <div class="copy" data-value="zeeshan@wanderlust-videos.com">
                        <button class="icon-action" type="button">
                            <i class="icon">content_copy</i>
                        </button>
                        <div class="copy__bubble">
                            Copied
                        </div>
                    </div>
                </div>
            </div>



            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>




    </body>
